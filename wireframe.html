<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nuevo — Wireframe Prototype</title>
<style>
:root {
  --black:  #000000;
  --ink:    #050505;
  --sheet:  #F8F8F3;
  --soft:   #EFEFE8;
  --line:   #D7D7CF;
  --muted:  #7D7D78;
  --sheet2: #E2E2DC;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111;
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  min-height: 100vh;
  gap: 0;
}

/* ── LEFT SIDEBAR ── */
.sidebar {
  background: #1a1a1a;
  padding: 28px 20px;
  border-right: 1px solid #2a2a2a;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-logo {
  font-size: 22px;
  font-weight: 900;
  color: white;
  letter-spacing: -0.05em;
  margin-bottom: 6px;
}
.sidebar-sub {
  font-size: 11px;
  color: #888;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 28px;
}
.flow-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  margin-bottom: 6px;
  transition: background 0.15s;
}
.flow-btn:hover { background: #2a2a2a; }
.flow-btn.active { background: white; }
.flow-btn.active .flow-num { background: var(--black); color: white; }
.flow-btn.active .flow-name { color: var(--ink); }
.flow-btn.active .flow-desc { color: var(--muted); }
.flow-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #333;
  color: #aaa;
  font-size: 11px;
  font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.flow-name { font-size: 13px; font-weight: 900; color: #ddd; line-height: 1.3; }
.flow-desc { font-size: 11px; color: #666; margin-top: 2px; line-height: 1.4; }

.sidebar-divider { border: none; border-top: 1px solid #2a2a2a; margin: 20px 0; }
.sidebar-hint { font-size: 11px; color: #555; line-height: 1.6; }

/* ── CENTER: PHONE + NAV ── */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 24px;
  min-height: 100vh;
}
.step-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}
.step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
  transition: all 0.2s;
}
.step-dot.active { background: white; width: 24px; border-radius: 4px; }
.phone-wrap { position: relative; }
.phone-frame {
  width: 360px;
  background: #0a0a0a;
  border-radius: 48px;
  padding: 10px;
  box-shadow:
    0 0 0 1px #2a2a2a,
    0 40px 80px rgba(0,0,0,0.9),
    inset 0 0 0 1px rgba(255,255,255,0.06);
}
.phone-notch {
  width: 120px; height: 28px;
  background: #0a0a0a;
  border-radius: 0 0 18px 18px;
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
.phone-notch-inner {
  width: 80px; height: 12px;
  background: #1a1a1a;
  border-radius: 6px;
}
.phone-screen {
  width: 100%;
  height: 740px;
  background: var(--sheet);
  border-radius: 40px;
  overflow: hidden;
  position: relative;
}
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px 6px;
  font-size: 12px;
  font-weight: 700;
  background: var(--sheet);
  position: relative;
  z-index: 5;
}
.status-icons { display: flex; gap: 5px; align-items: center; }
.status-battery {
  width: 22px; height: 11px;
  border: 1.5px solid var(--ink);
  border-radius: 3px;
  position: relative;
}
.status-battery::after {
  content: '';
  position: absolute;
  right: -4px; top: 50%;
  transform: translateY(-50%);
  width: 2px; height: 5px;
  background: var(--ink);
  border-radius: 0 1px 1px 0;
}
.status-battery-fill {
  position: absolute;
  left: 2px; top: 2px; bottom: 2px;
  width: 70%;
  background: var(--ink);
  border-radius: 1px;
}
.screen-content { height: calc(740px - 36px); overflow: hidden; }

/* Screen visibility */
.screen { display: none; height: 100%; }
.screen.visible { display: block; }

/* ── SCREEN COMPONENTS ── */
.top-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 52px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: var(--sheet);
}
.back-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900;
  flex-shrink: 0;
}
.bar-title { font-size: 16px; font-weight: 900; letter-spacing: -0.04em; flex: 1; }
.bar-right { font-size: 12px; font-weight: 700; color: var(--muted); }

.bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 68px;
  background: var(--ink);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 8px 10px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; flex: 1;
  font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.5);
  cursor: pointer;
}
.nav-item.active { color: white; }
.nav-icon { font-size: 18px; }

.feed-tab-bar {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--sheet);
}
.feed-tab {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  font-size: 13px; font-weight: 900;
  color: var(--muted);
  border-bottom: 2px solid transparent;
}
.feed-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

.post-card {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  background: var(--sheet);
}
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white; font-weight: 900;
  flex-shrink: 0;
}
.card-author { font-size: 13px; font-weight: 900; }
.card-time { font-size: 11px; color: var(--muted); }
.card-title { font-size: 15px; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 6px; }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.tag {
  padding: 3px 8px;
  border-radius: 99px;
  background: var(--soft);
  font-size: 10px; font-weight: 700;
}
.app-preview {
  height: 120px;
  border-radius: 12px;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 28px;
  margin-bottom: 10px;
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.app-preview-label {
  position: absolute;
  bottom: 8px; left: 8px;
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.4);
  padding: 2px 6px; border-radius: 4px;
}
.play-now-btn {
  display: flex; align-items: center; justify-content: center;
  height: 44px; width: 100%;
  border-radius: 99px;
  background: var(--black);
  color: white;
  font-size: 13px; font-weight: 900;
  letter-spacing: -0.02em;
}
.outline-btn {
  display: flex; align-items: center; justify-content: center;
  height: 40px;
  border-radius: 99px;
  border: 2px solid var(--line);
  color: var(--ink);
  font-size: 12px; font-weight: 900;
}
.action-row {
  display: flex; gap: 6px; margin-top: 10px;
}
.action-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 10px; border-radius: 99px;
  background: var(--soft);
  font-size: 11px; font-weight: 700; color: var(--muted);
}

/* PLAY MODE */
.play-header {
  background: var(--black);
  color: white;
  padding: 12px 16px 10px;
  display: flex; align-items: center; gap: 10px;
}
.play-back {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.play-title { font-size: 15px; font-weight: 900; flex: 1; }
.play-badge {
  font-size: 9px; font-weight: 900;
  background: rgba(255,255,255,0.15);
  padding: 3px 8px; border-radius: 99px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.entry-banner {
  background: #1a1a1a;
  color: white;
  padding: 8px 14px;
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700;
}
.entry-icon {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.iframe-mock {
  background: linear-gradient(160deg, #0f0f23 0%, #1a0a2e 50%, #0a1628 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  color: white;
  position: relative;
  overflow: hidden;
}
.iframe-mock::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.02) 20px,
    rgba(255,255,255,0.02) 21px
  );
}
.iframe-running {
  font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,0.1);
  padding: 4px 10px; border-radius: 99px;
  color: rgba(255,255,255,0.7);
  z-index: 1;
}
.iframe-emoji { font-size: 40px; z-index: 1; }
.iframe-name { font-size: 14px; font-weight: 900; z-index: 1; }

.next-app-section {
  background: white;
  border-top: 3px solid var(--soft);
}
.next-app-label {
  padding: 12px 16px 6px;
  font-size: 10px; font-weight: 900;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.next-app-card {
  padding: 10px 16px 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.next-app-thumb {
  width: 56px; height: 56px;
  border-radius: 12px;
  background: linear-gradient(135deg, #2d1b69, #11a4d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.next-app-info { flex: 1; }
.next-app-reason {
  font-size: 10px; font-weight: 700; color: var(--muted);
  margin-bottom: 2px;
}
.next-app-title { font-size: 14px; font-weight: 900; letter-spacing: -0.03em; }
.next-app-author { font-size: 11px; color: var(--muted); margin-top: 2px; }
.scroll-hint {
  text-align: center;
  padding: 10px;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.scroll-arrow {
  font-size: 16px;
  animation: bounce 1.4s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

/* REACTION / MODAL */
.reaction-row {
  display: flex; gap: 6px; padding: 10px 16px;
  border-top: 1px solid var(--line);
  overflow-x: auto;
}
.reaction-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 12px; border-radius: 12px;
  background: var(--soft);
  font-size: 10px; font-weight: 700; color: var(--muted);
  flex-shrink: 0;
}
.reaction-emoji { font-size: 20px; margin-bottom: 2px; }
.login-modal {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 32px;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
  z-index: 20;
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--line);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 20px; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 6px; }
.modal-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 52px; width: 100%;
  border-radius: 99px;
  background: var(--black);
  color: white;
  font-size: 14px; font-weight: 900;
  margin-bottom: 10px;
}
.skip-btn {
  text-align: center;
  font-size: 12px; font-weight: 700;
  color: var(--muted);
  padding: 8px;
}

/* REMIX */
.remix-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 99px;
  background: var(--soft);
  font-size: 11px; font-weight: 700; color: var(--ink);
}
.remix-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
}
.original-banner {
  background: var(--soft);
  border-left: 3px solid var(--ink);
  padding: 10px 14px;
  margin: 10px 14px;
  border-radius: 0 8px 8px 0;
}
.orig-label { font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.orig-title { font-size: 13px; font-weight: 900; margin-top: 2px; }
.form-group { padding: 10px 16px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
.form-input {
  width: 100%; height: 40px;
  border-radius: 10px;
  border: 1.5px solid var(--line);
  background: white;
  padding: 0 12px;
  font-size: 13px;
  font-family: inherit;
}
.form-input-area {
  width: 100%; height: 60px;
  border-radius: 10px;
  border: 1.5px solid var(--line);
  background: white;
  padding: 8px 12px;
  font-size: 12px;
  font-family: inherit;
  resize: none;
}
.ext-link-row {
  display: flex; gap: 6px; align-items: center;
  padding: 6px 16px;
}
.ext-link-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.ext-link-text { font-size: 12px; font-weight: 700; color: var(--muted); }

/* NOTIF */
.notif-item {
  display: flex; gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  align-items: flex-start;
}
.notif-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3b82f6;
  margin-top: 5px;
  flex-shrink: 0;
}
.notif-text { font-size: 13px; line-height: 1.5; }
.notif-text strong { font-weight: 900; }
.notif-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
.notif-preview {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

/* ── RIGHT PANEL ── */
.right-panel {
  background: #1a1a1a;
  padding: 28px 20px;
  border-left: 1px solid #2a2a2a;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.panel-section { margin-bottom: 24px; }
.panel-section-title {
  font-size: 10px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: #666; margin-bottom: 10px;
}
.panel-screen-name {
  font-size: 16px; font-weight: 900; color: white;
  margin-bottom: 4px; line-height: 1.3;
}
.panel-route {
  font-size: 11px; font-weight: 700; color: #888;
  font-family: monospace;
  background: #222;
  padding: 4px 8px; border-radius: 6px;
  display: inline-block; margin-bottom: 10px;
}
.panel-desc {
  font-size: 12px; color: #aaa;
  line-height: 1.6;
}
.panel-cta-row { margin-top: 12px; }
.panel-cta-label { font-size: 10px; font-weight: 700; color: #666; margin-bottom: 4px; }
.panel-cta-value { font-size: 12px; font-weight: 700; color: #ccc; }
.annotation {
  background: #222;
  border-left: 2px solid #555;
  padding: 8px 10px;
  border-radius: 0 6px 6px 0;
  font-size: 11px; color: #aaa;
  line-height: 1.5;
  margin-bottom: 6px;
}
.annotation strong { color: #eee; }
.nav-controls {
  display: flex; gap: 8px; margin-top: 20px;
}
.nav-ctrl-btn {
  flex: 1; height: 40px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.nav-ctrl-btn:hover { background: #333; }
.nav-ctrl-btn:disabled { opacity: 0.3; cursor: default; }
.nav-ctrl-btn.primary {
  background: white;
  color: var(--ink);
}
.nav-ctrl-btn.primary:hover { background: #f0f0f0; }

/* ── EXTERNAL ENTRY (Instagram mock) ── */
.ig-frame {
  height: 100%;
  background: #000;
  color: white;
  display: flex; flex-direction: column;
}
.ig-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: #000;
}
.ig-logo { font-size: 18px; font-weight: 900; font-style: italic; }
.ig-story-bar { display: flex; gap: 3px; padding: 8px 12px 0; }
.ig-story-seg {
  flex: 1; height: 2px;
  background: rgba(255,255,255,0.3);
  border-radius: 1px;
}
.ig-story-seg.done { background: white; }
.ig-story-user {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
}
.ig-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: white;
}
.ig-story-content {
  flex: 1;
  background: linear-gradient(180deg, #1a1a2e 0%, #2d1b69 50%, #11a4d4 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 20px;
}
.ig-link-btn {
  background: rgba(255,255,255,0.95);
  color: #000;
  border-radius: 99px;
  padding: 10px 20px;
  font-size: 13px; font-weight: 900;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.tap-arrow {
  font-size: 20px;
  animation: bounce 1.4s ease-in-out infinite;
}

/* STUDIO */
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 10px 16px;
}
.stat-card {
  background: white;
  border-radius: 12px;
  padding: 10px 12px;
  border: 1px solid var(--line);
}
.stat-num { font-size: 22px; font-weight: 900; letter-spacing: -0.05em; }
.stat-label { font-size: 10px; font-weight: 700; color: var(--muted); margin-top: 1px; }
.wes-bar {
  margin: 0 16px 8px;
  background: var(--soft);
  border-radius: 12px;
  padding: 12px 14px;
}
.wes-score { font-size: 28px; font-weight: 900; letter-spacing: -0.06em; }
.wes-label { font-size: 10px; font-weight: 700; color: var(--muted); }

/* UPLOAD */
.upload-step {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--line);
}
.step-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--ink);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0;
}
.step-circle.done { background: #22c55e; }
.step-circle.inactive { background: var(--soft); color: var(--muted); }
.step-text { font-size: 13px; font-weight: 700; }
.step-text.inactive { color: var(--muted); }

/* URL CHECK */
.url-check {
  margin: 8px 16px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid #22c55e;
  background: #f0fdf4;
  font-size: 12px; font-weight: 700;
  color: #15803d;
  display: flex; align-items: center; gap: 6px;
}
</style>
</head>
<body>
<div class="layout">

// ══════════════════════════════════════════════════
// STATE & RENDER
// ══════════════════════════════════════════════════
let currentFlow = 0;
let currentStep = 0;

function render() {
  const flow = flows[currentFlow];
  const screen = flow.screens[currentStep];

  // Screen content
  document.getElementById('screenContent').innerHTML = screen.html;

  // Step dots
  const stepBar = document.getElementById('stepBar');
  stepBar.innerHTML = flow.screens.map((_, i) =>
    `<div class="step-dot ${i === currentStep ? 'active' : ''}" onclick="goToStep(${i})" title="화면 ${i+1}"></div>`
  ).join('');

  // Right panel
  document.getElementById('panelTitle').textContent = screen.title;
  document.getElementById('panelRoute').textContent = screen.route;
  document.getElementById('panelDesc').textContent = screen.desc;
  document.getElementById('panelCta').textContent = screen.cta;
  document.getElementById('panelNext').textContent = screen.next;

  const ann = document.getElementById('panelAnnotations');
  ann.innerHTML = (screen.annotations || []).map(a =>
    `<div class="annotation"><strong>${a.strong}:</strong> ${a.text}</div>`
  ).join('');

  // Nav buttons
  document.getElementById('btnPrev').disabled = (currentFlow === 0 && currentStep === 0);
  document.getElementById('btnNext').textContent =
    (currentStep === flow.screens.length - 1 && currentFlow < flows.length - 1)
      ? `Flow ${currentFlow + 2} →`
      : '다음 →';
  document.getElementById('btnNext').disabled =
    (currentStep === flow.screens.length - 1 && currentFlow === flows.length - 1);

  // Sidebar active
  document.querySelectorAll('.flow-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentFlow);
  });
}

function switchFlow(index) {
  currentFlow = index;
  currentStep = 0;
  render();
}

function goToStep(index) {
  currentStep = index;
  render();
}

function nextScreen() {
  const flow = flows[currentFlow];
  if (currentStep < flow.screens.length - 1) {
    currentStep++;
  } else if (currentFlow < flows.length - 1) {
    currentFlow++;
    currentStep = 0;
  }
  render();
}

function prevScreen() {
  if (currentStep > 0) {
    currentStep--;
  } else if (currentFlow > 0) {
    currentFlow--;
    currentStep = flows[currentFlow].screens.length - 1;
  }
  render();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextScreen();
  if (e.key === 'ArrowLeft') prevScreen();
  if (e.key === 'ArrowUp' && currentFlow > 0) switchFlow(currentFlow - 1);
  if (e.key === 'ArrowDown' && currentFlow < flows.length - 1) switchFlow(currentFlow + 1);
});

// Init
render();
</script>
